</style></head><body class="__variable_geist_0tvmz3h __variable_geist_mono_1diim1n"><div class="app-shell topic-only-app"><aside class="sidebar"><div class="brand"><span class="brand-mark">潮</span><div><strong>潮汐洞察</strong><small>RED TREND LAB</small></div></div><nav><a class="active" href="#search"><span>#</span>话题搜索</a><a href="#topics"><span>↗</span>话题结果</a></nav><div class="sidebar-foot"><div class="source-card"><span class="status-dot"></span><div><small>数据口径</small><strong>相关内容聚合为话题</strong></div></div></div></aside><main><header><div><p class="eyebrow">XIAOHONGSHU TOPIC DISCOVERY</p><h1>小红书热门话题</h1><p class="subtitle">只看话题，不展示笔记列表。</p></div></header><section class="keyword-search" id="search"><div><p class="eyebrow">TOPIC SEARCH</p><h2>你想看什么关键词的热门话题？</h2><p>输入关键词即可；行业只是可选的进一步细分，不选也能直接查询。</p></div><form><label>⌕<input placeholder="例如：中女" value=""/></label><select aria-label="行业细分"><option selected="">全部行业</option><option>美妆护肤</option><option>健康</option><option>职场</option><option>情感关系</option><option>财务</option><option>生活方式</option></select><button class="primary-button">查询热门话题</button></form></section><section class="panel topic-empty"><div class="empty-icon">#</div><h2>输入关键词后，这里只呈现归纳后的热门话题</h2><p>例如输入“中女”，结果会是“中女的职场转型”“中女的抗老护肤”等话题，而不是一篇篇笔记标题。</p></section></main></div>
<script>
(() => {
  const form = document.querySelector(".keyword-search form");
  const input = form?.querySelector("input");
  const industry = form?.querySelector("select");
  const button = form?.querySelector("button");
  const panel = document.querySelector(".keyword-search");
  const escapeHtml = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[char]);
  const formatNumber = (value) => Number(value || 0) >= 10000 ? (Number(value) / 10000).toFixed(1) + "万" : Number(value || 0).toLocaleString("zh-CN");
  let status;
  const showStatus = (message, ok = false) => {
    if (!status) { status = document.createElement("p"); status.className = "search-error"; panel?.appendChild(status); }
    status.textContent = message; status.style.color = ok ? "#25835e" : "#d33d51";
  };
  const render = (data) => {
    document.querySelector(".topic-empty")?.remove();
    document.querySelectorAll(".search-result-section").forEach((node) => node.remove());
    const topics = Array.isArray(data.topics) ? data.topics : [];
    const sampleNotes = topics.reduce((sum, topic) => sum + Number(topic.notes || 0), 0);
    const sampleHeat = topics.reduce((sum, topic) => sum + Number(topic.heat || 0), 0);
    const industries = new Set(topics.map((topic) => topic.category)).size;
    const rows = topics.map((topic, index) => '<tr><td><span class="rank rank-' + (index + 1) + '">' + (index + 1) + '</span></td><td><div class="topic-cell"><strong># ' + escapeHtml(topic.title) + '</strong></div></td><td><span class="category-tag">' + escapeHtml(topic.category) + '</span></td><td><strong>' + formatNumber(topic.heat) + '</strong></td><td>' + Number(topic.notes || 0) + ' 条</td><td><div class="topic-keywords">' + (topic.keywords || []).slice(0,3).map((word) => '<span>' + escapeHtml(word) + '</span>').join("") + '</div></td></tr>').join("");
    const html = '<section class="notice connected search-result-section"><span>i</span><p><strong>当前口径：</strong>从包含“' + escapeHtml(data.keyword) + '”及其直接相关表达的内容中聚合话题；样本热度不是平台官方讨论总量。</p></section>' +
      '<section class="metric-grid search-result-section"><article><div class="metric-head"><span>归纳话题</span><b>#</b></div><strong>' + topics.length + '</strong><p>最多展示 50 个</p></article><article><div class="metric-head"><span>相关笔记样本</span><b>文</b></div><strong>' + formatNumber(sampleNotes) + '</strong><p>用于归纳，不直接展示</p></article><article><div class="metric-head"><span>样本互动热度</span><b>热</b></div><strong>' + formatNumber(sampleHeat) + '</strong><p>非官方话题浏览量</p></article><article><div class="metric-head"><span>覆盖行业</span><b>类</b></div><strong>' + industries + '</strong><p>' + escapeHtml(industry?.value || "全部行业") + '</p></article></section>' +
      '<section id="topics" class="panel ranking-panel search-result-section"><div class="ranking-header"><div><p>“' + escapeHtml(data.keyword) + '” · ' + escapeHtml(industry?.value || "全部行业") + '</p><h2>热门话题</h2></div></div><div class="table-wrap"><table><thead><tr><th>排名</th><th>热门话题</th><th>行业</th><th>样本热度</th><th>相关笔记</th><th>代表词</th></tr></thead><tbody>' + rows + '</tbody></table>' + (topics.length ? "" : '<div class="empty">没有足够直接相关的内容，因此没有硬凑话题。</div>') + '</div><footer><span>显示 ' + topics.length + ' 个话题 · 更新于 ' + new Date(data.updatedAt).toLocaleString("zh-CN") + '</span><span><i class="status-dot"></i>话题聚合结果</span></footer></section>';
    panel?.insertAdjacentHTML("afterend", html);
    document.querySelector("#topics")?.scrollIntoView({ behavior:"smooth" });
  };
  form?.addEventListener("submit", async (event) => {
    event.preventDefault();
    const keyword = String(input?.value || "").trim();
    if (!keyword) return showStatus("请输入一个关键词");
    button.disabled = true; button.textContent = "正在归纳…"; showStatus("");
    try {
      const params = new URLSearchParams({ keyword, industry: industry?.value || "全部行业", sort_type:"popularity_descending", time_filter:"一周内" });
      const apiBase = window.location.protocol === "file:" ? "https://snow-xhs-trends.netlify.app" : "";
      const response = await fetch(apiBase + "/api/search?" + params);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "查询失败，请稍后再试");
      render(data); showStatus("已归纳出 " + data.topics.length + " 个热门话题", true);
    } catch (error) { showStatus(error instanceof TypeError ? "无法连接实时数据接口，请检查网络后重试" : (error.message || "查询失败，请稍后再试")); }
    finally { button.disabled = false; button.textContent = "查询热门话题"; }
  });
})();
</script></body></html>
